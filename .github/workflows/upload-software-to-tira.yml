name: Upload Software to TIRA

on:
  workflow_dispatch:
    inputs:
      directory:
        description: "Directory that contains the submission Dockerfile"
        required: true
        default: "."

jobs:
  upload-software:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install TIRA client
        run: |
          python -m pip install --upgrade pip
          pip install tira

      - name: Login to TIRA
        run: tira-cli login --token "${{ secrets.TIRA_CLIENT_TOKEN }}"

      - name: Verify TIRA installation
        continue-on-error: true
        run: |
          tira-cli verify-installation \
            --task generative-ai-authorship-verification-panclef-2026 \
            --team ChatOnly

      - name: Upload code submission
        run: |
          tira-cli code-submission \
            --path "${{ inputs.directory }}" \
            --task generative-ai-authorship-verification-panclef-2026 \
            --dataset generative-ai-authorship-verification-panclef-2026/pan26-generative-ai-detection-smoke-test-20260330-training \
            --command 'python3 /app/predict.py $inputDataset/dataset.jsonl $outputDir'
